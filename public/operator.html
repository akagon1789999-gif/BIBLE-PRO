<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Operator Console — Sofer 2.0</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="manifest" href="/manifest-operator.json" />
<meta name="theme-color" content="#4f8cff" />
<link rel="icon" href="/icons/icon-192.png" />
<link rel="apple-touch-icon" href="/icons/icon-192.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-title" content="Sofer Operator" />
<style>
  :root {
    --bg: #0f1115;
    --panel: #171a21;
    --panel-2: #1f2330;
    --text: #e8eaed;
    --muted: #8a8f9a;
    --accent: #4f8cff;
    --good: #2ecc71;
    --bad: #e74c3c;
    --border: #2a2f3a;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  header {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 12px 20px;
    position: relative;
    overflow: hidden;
    background: linear-gradient(115deg, #050b16 0%, #0a1930 45%, #123258 100%);
    border-bottom: 1px solid var(--border);
  }
  header::before {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(
      100deg,
      transparent 0%, transparent 38%,
      rgba(111, 208, 255, 0.16) 48%,
      rgba(111, 208, 255, 0.05) 58%,
      transparent 68%, transparent 100%
    );
    pointer-events: none;
  }
  header > * { position: relative; z-index: 1; }
  header h1 {
    font-size: 16px; margin: 0; font-weight: 600; flex: 1;
    display: flex; align-items: baseline; gap: 8px;
  }
  .brand {
    font-size: 18px; font-weight: 800; letter-spacing: 0.01em;
    background: linear-gradient(90deg, #7fd6ff, #4f8cff);
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .brand-sub { font-size: 12px; font-weight: 500; color: var(--muted); }
  .app-logo { height: 28px; width: 28px; border-radius: 7px; background: white; padding: 2px; flex-shrink: 0; }
  .status-dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--bad); display: inline-block; margin-right: 6px;
  }
  .status-dot.live { background: var(--good); box-shadow: 0 0 8px var(--good); }
  button {
    font: inherit; border: none; border-radius: 8px; padding: 8px 16px;
    cursor: pointer; font-weight: 600; transition: opacity 0.15s;
  }
  button:hover { opacity: 0.85; }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-primary { background: var(--accent); color: white; }
  .btn-danger { background: var(--bad); color: white; }
  .btn-neutral { background: var(--panel-2); color: var(--text); border: 1px solid var(--border); }
  .mode-toggle {
    display: flex; background: var(--panel-2); border: 1px solid var(--border);
    border-radius: 8px; padding: 2px; gap: 2px;
  }
  .mode-btn {
    background: transparent; color: var(--muted); border: none; border-radius: 6px;
    padding: 6px 14px; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.15s;
  }
  .mode-btn:hover { opacity: 1; color: var(--text); }
  .mode-btn.active { background: var(--accent); color: white; }
  main {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 380px 320px 320px 320px 320px;
    gap: 1px;
    background: var(--border);
    overflow: hidden;
  }
  section { background: var(--bg); display: flex; flex-direction: column; overflow: hidden; }
  .panel-title {
    padding: 10px 16px; font-size: 12px; text-transform: uppercase;
    letter-spacing: 0.06em; color: var(--muted); border-bottom: 1px solid var(--border);
  }
  .panel-title-row { display: flex; align-items: center; justify-content: space-between; }
  .export-links { display: flex; gap: 12px; text-transform: none; letter-spacing: normal; }
  .export-links a { color: var(--accent); text-decoration: none; font-size: 12px; }
  .export-links a:hover { text-decoration: underline; }
  #transcript {
    flex: 1; overflow-y: auto; padding: 16px; font-size: 18px; line-height: 1.6;
  }
  #transcript .final { color: var(--text); }
  #transcript .interim { color: var(--muted); font-style: italic; }
  #suggestions { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 10px; }
  .card {
    background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 12px;
    animation: pop 0.2s ease-out;
  }
  @keyframes pop { from { transform: scale(0.96); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .card h3 { margin: 0 0 6px; font-size: 15px; }
  .card .badge {
    font-size: 10px; text-transform: uppercase; color: var(--muted);
    background: var(--panel-2); padding: 2px 6px; border-radius: 4px; margin-left: 6px;
  }
  .card p { margin: 0 0 10px; font-size: 14px; color: var(--text); opacity: 0.9; }
  .card p.loading { opacity: 0.5; font-style: italic; }
  .translation-select {
    width: 100%; margin-bottom: 8px; background: var(--panel-2); border: 1px solid var(--border);
    color: var(--text); border-radius: 6px; padding: 5px 8px; font: inherit; font-size: 12px;
  }
  .card .actions { display: flex; gap: 8px; }
  .card .actions button { flex: 1; padding: 6px; font-size: 13px; }
  #preview-section {
    background: var(--panel-2); border-top: 1px solid var(--border); padding: 12px 16px;
  }
  #preview-section .panel-title { padding: 0 0 8px; border-bottom: none; }
  #preview-frame {
    position: relative;
    aspect-ratio: 16 / 9;
    width: 100%;
    border-radius: 10px;
    overflow: hidden;
    background: #000000;
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background-color 0.5s ease;
  }
  #preview-bg-video {
    position: absolute; inset: 0; width: 100%; height: 100%;
    object-fit: cover; z-index: 0; display: none;
  }
  #preview-stage {
    position: relative;
    z-index: 1;
    width: 88%;
    text-align: center;
    opacity: 0;
    transition: opacity 0.4s ease;
  }
  #preview-stage.visible { opacity: 1; }
  #preview-panel {
    display: inline-block;
    max-width: 100%;
    padding: 8px 14px;
  }
  #previewText {
    font-family: Georgia, "Times New Roman", serif;
    font-size: 13px;
    line-height: 1.35;
    color: #ffffff;
    white-space: pre-line;
    /* Layered-shadow outline, not -webkit-text-stroke — stroke suppresses <u>. */
    text-shadow:
      -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000,
      0 0 5px rgba(0, 0, 0, 0.85);
  }
  #previewText.size-small { font-size: 10px; }
  #previewText.size-normal { font-size: 13px; }
  #previewText.size-large { font-size: 17px; }
  #previewText.size-xlarge { font-size: 21px; }
  #previewRef {
    margin-top: 6px;
    font-family: Georgia, "Times New Roman", serif;
    font-size: 10px;
    color: #d8b25c;
    letter-spacing: 0.03em;
    text-shadow:
      -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000,
      0 0 3px rgba(0, 0, 0, 0.85);
  }
  .manual-form { padding: 12px 16px; border-top: 1px solid var(--border); display: flex; gap: 8px; }
  .manual-form input {
    flex: 1; background: var(--panel-2); border: 1px solid var(--border); color: var(--text);
    border-radius: 8px; padding: 8px 10px; font: inherit;
  }
  .custom-text-form { padding: 12px 16px; border-top: 1px solid var(--border); }
  .custom-text-form .panel-title { padding: 0 0 8px; border-bottom: none; }
  .format-toolbar { display: flex; gap: 6px; margin-bottom: 8px; align-items: center; }
  .fmt-btn {
    width: 30px; height: 30px; padding: 0; font-size: 14px; line-height: 1;
    background: var(--panel-2); border: 1px solid var(--border); color: var(--text); border-radius: 6px;
  }
  .fmt-btn.active { background: var(--accent); border-color: var(--accent); color: white; }
  #fmtSize {
    background: var(--panel-2); border: 1px solid var(--border); color: var(--text);
    border-radius: 6px; padding: 0 8px; height: 30px; font: inherit; font-size: 12px;
  }
  #customTextInput {
    width: 100%; min-height: 52px; max-height: 160px; overflow-y: auto;
    background: var(--panel-2); border: 1px solid var(--border); color: var(--text);
    border-radius: 8px; padding: 8px 10px; font: inherit; line-height: 1.4;
  }
  #customTextInput:empty::before { content: attr(data-placeholder); color: var(--muted); }
  #customTextInput:focus { outline: 1px solid var(--accent); }
  .custom-text-form .actions { display: flex; gap: 8px; margin-top: 8px; }
  .custom-text-form .actions button { flex: 1; }
  .empty { color: var(--muted); padding: 20px; text-align: center; font-size: 14px; }
  .translation-select-mini { width: auto; margin-bottom: 0; max-width: 150px; }
  .bible-breadcrumb {
    display: flex; align-items: center; gap: 8px; padding: 8px 16px;
    border-bottom: 1px solid var(--border); font-size: 12px; color: var(--muted);
  }
  .bible-breadcrumb .bible-back { padding: 4px 10px; font-size: 12px; }
  .bible-browser-body { flex: 1; overflow-y: auto; padding: 8px; }
  .bible-section-header {
    font-size: 11px; text-transform: uppercase; color: var(--muted); padding: 8px 12px 4px;
    letter-spacing: 0.06em;
  }
  .bible-book-item {
    padding: 10px 12px; border-radius: 8px; cursor: pointer; font-size: 14px;
    display: flex; justify-content: space-between; color: var(--text);
  }
  .bible-book-item:hover { background: var(--panel-2); }
  .bible-chapter-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 6px; padding: 4px; }
  .bible-chapter-btn {
    aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
    background: var(--panel-2); border: 1px solid var(--border); border-radius: 6px;
    color: var(--text); cursor: pointer; font-size: 13px;
  }
  .bible-chapter-btn:hover { border-color: var(--accent); }
  .bible-verse-row {
    padding: 8px 10px; border-bottom: 1px solid var(--border); display: flex; gap: 8px; align-items: flex-start;
  }
  .bible-verse-num { color: var(--accent); font-weight: 700; font-size: 12px; flex-shrink: 0; width: 20px; padding-top: 2px; }
  .bible-verse-text { flex: 1; font-size: 13px; line-height: 1.5; }
  .bible-verse-project {
    flex-shrink: 0; background: var(--panel-2); border: 1px solid var(--border); border-radius: 6px;
    color: var(--text); cursor: pointer; padding: 4px 8px; font-size: 12px;
  }
  .bible-verse-project:hover { border-color: var(--accent); color: var(--accent); }
  .bible-verse-add {
    flex-shrink: 0; background: var(--panel-2); border: 1px solid var(--border); border-radius: 6px;
    color: var(--text); cursor: pointer; padding: 4px 8px; font-size: 12px; width: 26px;
  }
  .bible-verse-add:hover { border-color: var(--accent); color: var(--accent); }
  .obs-panel { border-top: 1px solid var(--border); padding: 10px 16px; }
  .obs-panel .panel-title { padding: 0 0 8px; border-bottom: none; }
  .obs-scenes-list { display: flex; flex-wrap: wrap; gap: 6px; }
  .obs-scene-btn {
    background: var(--panel-2); border: 1px solid var(--border); border-radius: 6px;
    color: var(--text); padding: 6px 10px; font-size: 12px; cursor: pointer;
  }
  .obs-scene-btn:hover { border-color: var(--accent); }
  .obs-scene-btn.active { background: var(--accent); border-color: var(--accent); color: white; }
  #background-bar {
    display: flex; align-items: center; gap: 10px; padding: 10px 20px;
    background: var(--panel); border-bottom: 1px solid var(--border);
  }
  #background-bar .bg-label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }
  #bg-swatches { display: flex; gap: 8px; flex-wrap: wrap; }
  .swatch {
    width: 30px; height: 30px; border-radius: 7px; cursor: pointer;
    border: 2px solid var(--border); padding: 0; background-size: cover; background-position: center;
    position: relative; overflow: hidden;
  }
  .swatch:hover { opacity: 0.85; }
  .swatch.selected { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(79, 140, 255, 0.35); }
  .swatch video { width: 100%; height: 100%; object-fit: cover; pointer-events: none; }
  #background-bar .spacer { flex: 1; }
  #background-bar .bg-divider { width: 1px; align-self: stretch; background: var(--border); margin: 0 2px; }
  .stt-mode-label {
    font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 6px;
    background: var(--panel-2); color: var(--muted);
  }
  .stt-mode-label.offline { background: rgba(231, 76, 60, 0.18); color: #ff8a7a; }
  .stt-mode-label.connected { background: rgba(46, 204, 113, 0.18); color: #6bdb9a; }
  .media-tabs { display: flex; gap: 4px; padding: 8px 12px; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
  .media-tab {
    background: var(--panel-2); border: 1px solid var(--border); color: var(--muted);
    border-radius: 6px; padding: 5px 10px; font-size: 12px; cursor: pointer; font-weight: 600;
  }
  .media-tab:hover { color: var(--text); }
  .media-tab.active { background: var(--accent); border-color: var(--accent); color: white; }
  .media-toolbar { display: flex; gap: 8px; padding: 8px 12px; border-bottom: 1px solid var(--border); }
  .media-search {
    flex: 1; background: var(--panel-2); border: 1px solid var(--border); color: var(--text);
    border-radius: 6px; padding: 6px 8px; font: inherit; font-size: 12px; min-width: 0;
  }
  .media-upload-btn { font-size: 12px; padding: 6px 10px; white-space: nowrap; }
  .media-grid {
    flex: 1; overflow-y: auto; padding: 10px; display: grid;
    grid-template-columns: repeat(2, 1fr); gap: 10px; align-content: start;
  }
  .media-tile {
    position: relative; border-radius: 8px; overflow: hidden; border: 2px solid var(--border);
    aspect-ratio: 1; background: var(--panel-2); padding: 0;
  }
  .media-tile.clickable { cursor: pointer; }
  .media-tile.clickable:hover { border-color: var(--accent); }
  .media-tile img, .media-tile video {
    width: 100%; height: 100%; object-fit: cover; pointer-events: none;
  }
  .media-tile-label {
    position: absolute; left: 0; right: 0; bottom: 0; padding: 4px 6px; font-size: 10px;
    background: rgba(0, 0, 0, 0.65); color: var(--text); white-space: nowrap;
    overflow: hidden; text-overflow: ellipsis; text-align: left;
  }
  .media-tile-delete {
    position: absolute; top: 4px; right: 4px; width: 20px; height: 20px; padding: 0;
    border-radius: 50%; background: rgba(0, 0, 0, 0.65); color: white; border: none;
    font-size: 12px; line-height: 1; display: none; cursor: pointer;
  }
  .media-tile:hover .media-tile-delete { display: block; }
  .media-tile-add {
    position: absolute; top: 4px; left: 4px; width: 20px; height: 20px; padding: 0;
    border-radius: 50%; background: rgba(0, 0, 0, 0.65); color: white; border: none;
    font-size: 12px; line-height: 1; display: none; cursor: pointer;
  }
  .media-tile:hover .media-tile-add { display: block; }
  .song-search-bar { padding: 8px 12px; border-bottom: 1px solid var(--border); }
  .song-body { flex: 1; overflow-y: auto; padding: 10px; }
  .song-list-item {
    padding: 10px 12px; border-radius: 8px; cursor: pointer; display: flex; flex-direction: column;
    gap: 2px; margin-bottom: 4px;
  }
  .song-list-item:hover { background: var(--panel-2); }
  .song-title { font-size: 14px; color: var(--text); }
  .song-meta { font-size: 11px; color: var(--muted); }
  .song-detail-title { font-size: 16px; font-weight: 600; margin-bottom: 2px; }
  .song-detail-artist { font-size: 12px; color: var(--muted); margin-bottom: 10px; }
  .song-section-item { display: flex; align-items: stretch; gap: 6px; margin-bottom: 6px; }
  .song-section-project {
    flex: 1; display: block; text-align: left; padding: 8px 10px; border-radius: 8px;
    cursor: pointer; border: 1px solid var(--border); background: var(--panel-2); min-width: 0;
  }
  .song-section-project:hover { border-color: var(--accent); }
  .song-section-item.live .song-section-project { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(79, 140, 255, 0.25); }
  .song-section-add {
    flex-shrink: 0; width: 28px; border-radius: 8px; background: var(--panel-2);
    border: 1px solid var(--border); color: var(--text); cursor: pointer; font-size: 14px;
  }
  .song-section-add:hover { border-color: var(--accent); color: var(--accent); }
  .song-section-label { font-size: 11px; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: 0.04em; }
  .song-section-snippet {
    font-size: 12px; color: var(--text); opacity: 0.8; margin-top: 2px; white-space: nowrap;
    overflow: hidden; text-overflow: ellipsis;
  }
  .song-nav { display: flex; align-items: center; gap: 8px; padding: 10px 0 4px; border-top: 1px solid var(--border); margin-top: 8px; }
  .song-nav button { flex: 1; padding: 6px; font-size: 12px; }
  .song-nav-pos { font-size: 11px; color: var(--muted); white-space: nowrap; }
  .song-form input, .song-form textarea {
    width: 100%; background: var(--panel-2); border: 1px solid var(--border); color: var(--text);
    border-radius: 6px; padding: 6px 8px; font: inherit; font-size: 12px; margin-bottom: 8px;
  }
  .song-form textarea { min-height: 60px; resize: vertical; }
  .song-section-row { border: 1px solid var(--border); border-radius: 8px; padding: 8px; margin-bottom: 8px; position: relative; }
  .song-section-row-remove {
    position: absolute; top: 6px; right: 6px; width: 20px; height: 20px; padding: 0; border-radius: 50%;
    background: var(--panel); border: 1px solid var(--border); color: var(--text); font-size: 12px; cursor: pointer;
  }
  .song-form-actions { display: flex; gap: 8px; margin-top: 4px; }
  .song-form-actions button { flex: 1; font-size: 12px; }
  .playlist-strip { padding: 10px 12px; border-bottom: 1px solid var(--border); display: flex; flex-direction: column; gap: 6px; }
  .playlist-strip-row {
    display: flex; align-items: center; gap: 8px; padding: 6px 8px; border-radius: 6px;
    background: var(--panel-2); cursor: pointer; border: none; width: 100%; text-align: left;
  }
  .playlist-strip-row:hover:not(:disabled) { outline: 1px solid var(--accent); }
  .playlist-strip-row:disabled { opacity: 0.4; cursor: default; }
  .playlist-strip-tag { font-size: 10px; text-transform: uppercase; color: var(--muted); width: 78px; flex-shrink: 0; }
  .playlist-strip-label {
    font-size: 13px; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .playlist-strip-row.current .playlist-strip-label { color: var(--accent); font-weight: 700; }
  .playlist-list { flex: 1; overflow-y: auto; padding: 8px; }
  .playlist-item {
    display: flex; align-items: center; gap: 6px; padding: 6px 8px; border-radius: 8px;
    border: 1px solid var(--border); background: var(--panel-2); margin-bottom: 6px;
  }
  .playlist-item.current { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(79, 140, 255, 0.25); }
  .playlist-item-main {
    flex: 1; min-width: 0; text-align: left; background: none; border: none; color: var(--text);
    cursor: pointer; padding: 0; display: block;
  }
  .playlist-item-type { font-size: 9px; text-transform: uppercase; color: var(--muted); letter-spacing: 0.04em; }
  .playlist-item-label { font-size: 13px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .playlist-item-controls { display: flex; flex-direction: column; gap: 2px; flex-shrink: 0; }
  .playlist-item-btn {
    width: 20px; height: 16px; padding: 0; font-size: 9px; line-height: 1; border-radius: 3px;
    background: var(--panel); border: 1px solid var(--border); color: var(--muted); cursor: pointer;
  }
  .playlist-item-btn:hover:not(:disabled) { color: var(--text); border-color: var(--accent); }
  .playlist-item-btn:disabled { opacity: 0.3; cursor: default; }
  .playlist-item-delete {
    width: 20px; height: 20px; padding: 0; border-radius: 50%; background: var(--panel);
    border: 1px solid var(--border); color: var(--text); font-size: 12px; cursor: pointer; flex-shrink: 0;
  }
</style>
</head>
<body>
  <header>
    <span class="status-dot" id="statusDot"></span>
    <img class="app-logo" src="/icons/icon-192.png" alt="Sofer 2.0" />
    <h1><span class="brand">Sofer 2.0</span><span class="brand-sub">— Operator Console</span></h1>
    <span class="stt-mode-label" id="sttModeLabel" style="display:none"></span>
    <div class="mode-toggle" role="group" aria-label="Approval mode">
      <button type="button" class="mode-btn active" id="modeManualBtn" title="Suggestions wait for your Approve click">Manual</button>
      <button type="button" class="mode-btn" id="modeAutoBtn" title="Detected verses are shown immediately, no approval needed">Auto</button>
    </div>
    <button class="btn-primary" id="listenBtn">Start Listening</button>
    <button class="btn-danger" id="clearBtn">Clear Display</button>
    <button class="btn-neutral" id="installBtn" style="display:none">📲 Install App</button>
  </header>
  <div id="background-bar">
    <span class="bg-label">Background</span>
    <div id="bg-swatches"></div>
    <div class="spacer"></div>
    <button class="btn-neutral" id="bgUploadBtn">Upload Image/Video</button>
    <input
      type="file"
      id="bgFileInput"
      accept="image/png,image/jpeg,image/webp,image/gif,video/mp4,video/webm,video/quicktime"
      style="display:none"
    />
  </div>
  <main>
    <section>
      <div class="panel-title panel-title-row">
        <span>Live Transcript</span>
        <span class="export-links">
          <a href="/api/export/transcript.txt" download>Export TXT</a>
          <a href="/api/export/transcript.pdf" download>Export PDF</a>
          <a href="#" id="downloadRecordingLink">Download Audio</a>
        </span>
      </div>
      <div id="transcript"><span class="interim">Waiting for speech…</span></div>
    </section>
    <section>
      <div class="panel-title">Verse Suggestions</div>
      <div id="suggestions"><div class="empty">No suggestions yet.</div></div>
      <div id="preview-section">
        <div class="panel-title">Projector Preview</div>
        <select id="liveTranslationSelect" class="translation-select" style="display:none"></select>
        <div id="preview-frame">
          <video id="preview-bg-video" muted loop playsinline></video>
          <div id="preview-stage">
            <div id="preview-panel">
              <div id="previewText"></div>
              <div id="previewRef"></div>
            </div>
          </div>
        </div>
      </div>
      <div class="manual-form">
        <input id="manualInput" placeholder="Manual: John 3:16" />
        <button class="btn-neutral" id="manualBtn">Show</button>
      </div>
      <div class="custom-text-form">
        <div class="panel-title">Custom Text</div>
        <div class="format-toolbar">
          <button type="button" class="fmt-btn" id="fmtBold" title="Bold"><b>B</b></button>
          <button type="button" class="fmt-btn" id="fmtItalic" title="Italic"><i>I</i></button>
          <button type="button" class="fmt-btn" id="fmtUnderline" title="Underline"><u>U</u></button>
          <select id="fmtSize" title="Text size">
            <option value="small">Small</option>
            <option value="normal" selected>Normal</option>
            <option value="large">Large</option>
            <option value="xlarge">Extra Large</option>
          </select>
        </div>
        <div id="customTextInput" contenteditable="true" data-placeholder="Type an announcement or message to project…"></div>
        <div class="actions">
          <button class="btn-primary" id="customTextBtn">Project</button>
          <button class="btn-neutral" id="customTextAddBtn" title="Add to Playlist">+ Playlist</button>
          <button class="btn-neutral" id="speakBtn">🔊 Speak</button>
        </div>
      </div>
    </section>
    <section>
      <div class="panel-title panel-title-row">
        <span>Bible Browser</span>
        <select id="bibleTranslationSelect" class="translation-select translation-select-mini"></select>
      </div>
      <div class="bible-breadcrumb">
        <button class="btn-neutral bible-back" id="bibleBackBtn" style="display:none">‹ Back</button>
        <span id="bibleBreadcrumbLabel">Old &amp; New Testament</span>
      </div>
      <div id="bibleBrowserBody" class="bible-browser-body"></div>
      <div class="obs-panel">
        <div class="panel-title panel-title-row">
          <span>OBS Control</span>
          <span class="stt-mode-label" id="obsStatusBadge">Disconnected</span>
        </div>
        <div id="obsScenesList" class="obs-scenes-list"></div>
      </div>
    </section>
    <section>
      <div class="panel-title">Media Library</div>
      <div id="mediaTabs" class="media-tabs"></div>
      <div class="media-toolbar">
        <input type="text" id="mediaSearchInput" class="media-search" placeholder="Search…" />
        <button class="btn-neutral media-upload-btn" id="mediaUploadBtn">Upload</button>
        <input type="file" id="mediaFileInput" accept="image/png,image/jpeg,image/webp,image/gif,video/mp4,video/webm,video/quicktime" style="display:none" />
      </div>
      <div id="mediaGrid" class="media-grid"></div>
    </section>
    <section>
      <div class="panel-title panel-title-row">
        <span>Song Library</span>
        <button class="btn-neutral" id="songAddBtn" style="padding:4px 10px;font-size:12px;">+ Add Song</button>
      </div>
      <div class="song-search-bar">
        <input type="text" id="songSearchInput" class="media-search" placeholder="Search songs…" />
      </div>
      <div id="songBody" class="song-body"></div>
    </section>
    <section>
      <div class="panel-title">Service Playlist</div>
      <div id="playlistStrip" class="playlist-strip"></div>
      <div id="playlistList" class="playlist-list"></div>
    </section>
  </main>
  <script src="operator.js"></script>
</body>
</html>
